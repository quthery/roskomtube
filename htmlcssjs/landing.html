<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>RoskomTube</title>
  </head>
  <body>
    <nav>
      <div class="logo">
        <a class="home-link" href="/">
          <img class="logo-img" src="youtube.svg" alt="logo" />
          <p class="home-text" href="/home" class="home">RoskomTube</p>
        </a>
      </div>
      <div class="center-content">
        <div class="search-container">
          <div class="input-search-container">
            <input class="search-input" type="text" name="" value="" />
            <button class="search-button" type="submit">
              <img
                class="search-img"
                src="https://static-00.iconduck.com/assets.00/search-icon-2048x2048-cmujl7en.png"
                alt="search"
              />
            </button>
          </div>
        </div>
      </div>
      <div class="profile-container">
        <label id="switch" class="switch">
          <input type="checkbox" onchange="toggleTheme()" id="slider" />
          <span class="slider round"></span>
        </label>
        <a class="profile-link" href="#" class="Profile">
          <img class="profile-img" src="avatar.jpg" alt="profile" />
        </a>
      </div>
    </nav>
    <div class="sidebar">
      <a class="sidebar-link" href="#home">
        <img
          class="sidebar-img"
          src="https://www.svgrepo.com/show/22031/home-icon-silhouette.svg"
          alt="logo"
        />
      </a>
      <!--this link for youtube shorts-->
      <a class="sidebar-link" href="#shorts">
        <img
          class="sidebar-img"
          src="https://www.svgrepo.com/show/34825/short-pants.svg"
          alt="logo"
        />
      </a>
      <a class="sidebar-link" href="#history">
        <img
          class="sidebar-img"
          src="https://uxwing.com/wp-content/themes/uxwing/download/user-interface/history-line-icon.png"
          alt="logo"
        />
      </a>
      <a class="sidebar-link" href="https://github.com/quthery/roskomtube">
        <img
          class="sidebar-img"
          src="https://cdn.freebiesupply.com/logos/large/2x/github-icon-1-logo-black-and-white.png"
          alt="logo"
        />
      </a>
    </div>
    <div class="content">
      <div class="video-item">
        <img src="preview.jpeg" alt="asd" />
        <p>Название видео 1</p>
      </div>
      <div class="video-item">
        <img src="preview.jpeg" alt="Видео 2 превью" />
        <p>Название видео 2</p>
      </div>
      <div class="video-item">
        <img src="preview.jpeg" alt="Видео 3 превью" />
        <p>Название видео 3</p>
      </div>
      <div class="video-item">
        <img src="preview.jpeg" alt="Видео 4 превью" />
        <p>Название видео 4</p>
      </div>
      <div class="video-item">
        <img src="preview.jpeg" alt="Видео 4 превью" />
        <p>Название видео 4</p>
      </div>
      <div class="video-item">
        <img src="preview.jpeg" alt="Видео 4 превью" />
        <p>Название видео 4</p>
      </div>
      <div class="video-item">
        <img src="preview.jpeg" alt="Видео 4 превью" />
        <p>Название видео 4</p>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
